services:
  redis:
    image: redis:latest
    container_name: clipforge-redis
    ports:
      - "6379:6379"
    volumes:
      - clipforge-redis-data:/data
    command: >
      redis-server
      --save 900 1
      --save 300 10
      --save 60 10000
      --loglevel notice
    restart: unless-stopped

  # IndicXlit Latin→Telugu suggestion service. Isolated container — its
  # fairseq deps must NEVER share an environment with the main app's ASR
  # stack. The API (running on the host) reaches it at localhost:8010
  # (INDICXLIT_URL env overrides). Model is baked into the image at build.
  indicxlit:
    build: ./indicxlit
    container_name: clipforge-indicxlit
    ports:
      - "8010:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s

volumes:
  clipforge-redis-data:
    external: true
